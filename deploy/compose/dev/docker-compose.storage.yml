# =============================================================
# DEV — MinIO (S3-compatible object storage)
# Requires docker-compose.db.yml to be started first (creates network).
# Bucket initialised on first start via the `minio-init` job which uses
# the MinIO Client (mc) to create ${STORAGE_BUCKET} if missing.
# =============================================================

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

volumes:
  minio_data:
    name: ${COMPOSE_PROJECT_NAME}_minio_data

services:
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio
    hostname: ${COMPOSE_PROJECT_NAME}_minio
    env_file: ../../../.env.dev
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${STORAGE_PORT}:9000"
      - "${STORAGE_CONSOLE_PORT}:9001"
    networks: [app_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio_init
    env_file: ../../../.env.dev
    depends_on:
      minio:
        condition: service_healthy
    networks: [app_network]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://${COMPOSE_PROJECT_NAME}_minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET} &&
      mc anonymous set download local/${STORAGE_BUCKET} ||
      echo 'MinIO init complete'
      "
    restart: "no"
