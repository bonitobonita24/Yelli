# =============================================================
# DEV — pgAdmin 4 (PostgreSQL web management UI)
#
# Auto-registers the dev Postgres server via pgadmin-servers.json on first start.
# Requires docker-compose.db.yml started first (creates network + postgres).
#
# Access: http://localhost:${PGADMIN_PORT}
# Credentials: PGADMIN_EMAIL + PGADMIN_PASSWORD from .env.dev / CREDENTIALS.md
# =============================================================

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

volumes:
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME}_pgadmin_data

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME}_pgadmin
    hostname: ${COMPOSE_PROJECT_NAME}_pgadmin
    env_file: ../../../.env.dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT}:80"
    networks: [app_network]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
