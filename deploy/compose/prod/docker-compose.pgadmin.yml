# =============================================================
# PRODUCTION — pgAdmin 4
# ⚠ Restrict access via firewall — never expose port 5050 to public internet.
# Prefer SSH tunnel or VPN for production DB management access.
# =============================================================

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

volumes:
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME}_pgadmin_data

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME}_pgadmin
    hostname: ${COMPOSE_PROJECT_NAME}_pgadmin
    env_file: ../../../.env.prod
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT}:80"
    networks: [app_network]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
