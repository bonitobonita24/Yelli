# =============================================================
# PRODUCTION — MinIO (S3-compatible). Self-hosted prod.
# Migrate to AWS S3 / R2 by removing this file and pointing
# STORAGE_ENDPOINT in .env.prod at the external service.
# =============================================================

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

volumes:
  minio_data:
    name: ${COMPOSE_PROJECT_NAME}_minio_data

services:
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio
    hostname: ${COMPOSE_PROJECT_NAME}_minio
    env_file: ../../../.env.prod
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${STORAGE_PORT}:9000"
      - "${STORAGE_CONSOLE_PORT}:9001"
    networks: [app_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME}_minio_init
    env_file: ../../../.env.prod
    depends_on:
      minio:
        condition: service_healthy
    networks: [app_network]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://${COMPOSE_PROJECT_NAME}_minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET} ||
      echo 'MinIO init complete'
      "
    restart: "no"
