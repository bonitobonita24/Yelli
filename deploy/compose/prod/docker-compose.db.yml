# =============================================================
# PRODUCTION — PostgreSQL + PgBouncer
# Standard prod ports: postgres=5432, pgbouncer=6432.
# Must start FIRST — creates the shared Docker network.
# =============================================================

networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    driver: bridge

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}_postgres_data

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    hostname: ${COMPOSE_PROJECT_NAME}_postgres
    env_file: ../../../.env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks: [app_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ${COMPOSE_PROJECT_NAME}_pgbouncer
    hostname: ${COMPOSE_PROJECT_NAME}_pgbouncer
    env_file: ../../../.env.prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${COMPOSE_PROJECT_NAME}_postgres:5432/${DB_NAME}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "50"
      AUTH_TYPE: md5
    ports:
      - "${PGBOUNCER_PORT}:5432"
    networks: [app_network]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
