name: Docker Build and Publish

# Spec-Driven Platform V31 (V27 deployment model) — build and push the production Docker image
# on every merge to main. Three tags pushed per run:
#   :latest          — current production image (Komodo prod Stack pulls this on manual Deploy)
#   :staging-latest  — Komodo staging Stack auto-updates by polling Docker Hub for this digest
#   :sha-<short>     — immutable per-commit tag for pinned rollbacks
#
# Docker Hub is the handoff point between CI and deployment. GitHub Actions never contacts
# Komodo directly (V27 — Komodo auto-update for staging + manual Deploy for production).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — Docker Hub username (locked: bonitobonita24, per DECISIONS_LOG)
#   DOCKERHUB_TOKEN     — Docker Hub access token (NOT account password)
#
# Image identity (locked in inputs.yml docker.hub_repo + docker.image_name):
#   bonitobonita24/yelli
#
# Security: all `run:` lines reference only project-controlled env vars and secrets.
# No untrusted inputs (PR titles, issue bodies, branch names) flow into shell commands.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/yelli
  DOCKERFILE_PATH: ./apps/web/Dockerfile

jobs:

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (multi-platform support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=staging-latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
