name: CI

# Spec-Driven Platform V31 — governance gates + Turbo quality matrix + dependency audit.
# Runs on every push to main and every PR. Mirrors the 9-command Phase 5 local validation set
# (minus `pnpm tools:check-env`, which validates local .env.<env> files against .env.example
# and is a developer-machine concern, not a CI concern — CI gets runtime values from
# GitHub Secrets, not committed env files).
#
# Security: all `run:` lines reference only project-controlled env vars and matrix values.
# No untrusted inputs (PR titles, issue bodies, branch names) flow into shell commands.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"

jobs:

  governance:
    name: Governance gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate inputs.yml against schema
        run: pnpm tools:validate-inputs

      - name: Check PRODUCT.md and inputs.yml sync (Rule 9 + Rule 20 private-tag leak scan)
        run: pnpm tools:check-product-sync

      - name: Hydration footgun scan
        run: pnpm tools:hydration-lint

  quality:
    name: Turbo ${{ matrix.task }}
    needs: governance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @yelli/db db:generate

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.task }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.task }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-${{ matrix.task }}-

      - name: Run turbo task
        run: pnpm turbo run ${{ matrix.task }} --cache-dir=.turbo
        # NOTE: packages without a `test` script are skipped silently by turbo.
        # Test harness is deferred per Parts 5b-5f precedent — added in a dedicated test-suite Part.

  coverage:
    name: Coverage threshold gate
    needs: governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @yelli/db db:generate

      - name: Run tests with coverage thresholds
        # Thresholds defined in apps/web/vitest.config.ts (Phase 7 #5).
        # Global floor catches catastrophic regression; per-file gates lock
        # fully-tested routers (e.g. auth.ts) at their measured coverage.
        # To raise thresholds: add tests, re-measure, bump values.
        run: pnpm test:coverage

      - name: Upload coverage report (HTML + lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

  security:
    name: Dependency vulnerability audit
    needs: governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for vulnerabilities at .npmrc threshold
        # Threshold: CRITICAL severity blocks the merge; HIGH and below are warnings.
        # Both `.npmrc` and this CLI flag declare `critical` — they're kept in sync
        # so policy is readable in either place. The CLI flag is the authoritative
        # enforcement: pnpm 10's `pnpm audit` does NOT honor `.npmrc audit-level`
        # for its exit code (only `pnpm config get audit-level` reads it). Phase 7
        # #9 (2026-05-17) attempted .npmrc-only and was caught by Phase 7 #10's
        # full validation pass — see lessons.md [[pnpm10-audit-level-ignored]].
        # To resolve a new finding: `pnpm audit --fix` locally, or upgrade the
        # affected package, or document mitigation in DECISIONS_LOG and keep both
        # `.npmrc` + this flag at `critical` (phases.md Phase 5 CVE decision tree).
        run: pnpm audit --audit-level=critical

  e2e:
    name: Playwright E2E (Chromium)
    needs: governance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yelli_e2e
          POSTGRES_PASSWORD: yelli_e2e_pw_min22chars_ci_only
          POSTGRES_DB: yelli_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping | grep -q PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Database — matches services.postgres
      DATABASE_URL: postgresql://yelli_e2e:yelli_e2e_pw_min22chars_ci_only@localhost:5432/yelli_e2e
      # Cache — matches services.valkey
      REDIS_URL: redis://localhost:6379
      # Auth.js v5 (apps/web env.ts requires AUTH_SECRET min 32 chars)
      AUTH_SECRET: e2e-ci-auth-secret-min-32-chars-static-not-prod-xxxx
      AUTH_TRUST_HOST: "true"
      # Storage intentionally unset — LIVEKIT_E2E_MOCK=true bypasses all MinIO/S3 calls.
      # STORAGE_* vars are .optional() in apps/web/src/env.ts; omitting them is safe.
      # Storage will need to be added if a future e2e spec asserts on uploaded artefacts.
      STORAGE_REGION: us-east-1
      # Cloudflare Turnstile — official test keys (always pass — never expose to CI runner network)
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      # App
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_SLUG: yelli
      APP_PORT: "3000"
      NODE_ENV: test
      # E2E guard — keeps LiveKit Egress calls mocked so CI runs without LK creds.
      # Source of truth: apps/web/src/lib/livekit/egress-client.ts (early return on "true").
      LIVEKIT_E2E_MOCK: "true"
      # Webmaster credential — used by packages/db/prisma/seed.ts AND e2e/auth.setup.ts.
      # Static CI-only value; never touches prod (DATABASE_URL points at ephemeral postgres service).
      # Must be >= 22 chars per seed.ts validation.
      WEBMASTER_PASSWORD: e2e-webmaster-pw-min-22-chars-static-not-prod
      # E2E bypass dual gate (apps/web/src/server/auth-bypass.ts) — skips bcrypt/Turnstile/UI.
      # Both required: AUTH_BYPASS_FOR_E2E=true AND APP_ENV!=production. Never set in prod env.
      AUTH_BYPASS_FOR_E2E: "true"
      APP_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (Chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm --filter @yelli/db db:generate

      - name: Run Prisma migrations (deploy mode)
        run: pnpm --filter @yelli/db exec prisma migrate deploy

      - name: Seed database (webmaster account)
        run: pnpm --filter @yelli/db exec tsx prisma/seed.ts

      - name: Run Playwright e2e suite
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 7
