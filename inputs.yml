# Yelli — Locked App Specification
# Version: 3 (Spec-Driven Platform V31)
# Generated by Phase 3 — 2026-05-11
# AGENT-OWNED — never edit manually. Edit docs/PRODUCT.md and run Feature Update.

version: 3

app:
  name: Yelli
  slug: yelli
  description: Instant video intercom for offices, hospitals, and government departments
  industry: communication
  app_type: saas_with_self_hosted_path

tenancy:
  mode: multi                  # SaaS deployment — full L1-L6 active
  self_hosted_mode: single     # Self-hosted path — L3+L5+L6 active, L1+L2+L4 dormant
  isolation: shared_schema_with_tenant_id
  scoping_column: organization_id
  url_routing: subdomain       # [org-slug].yelli.powerbyte.app
  db_isolation_exception: none

environments:
  - dev
  - staging
  - prod

domains:
  dev:
    base_url: "http://localhost:${ports.dev.app}"
  staging:
    base_url: "https://yelli-staging.powerbyte.app"
    app_domain: "yelli-staging.powerbyte.app"
  prod:
    base_url: "https://yelli.powerbyte.app"
    app_domain: "yelli.powerbyte.app"

tech_stack:
  frontend: nextjs              # Next.js 15 App Router
  api: trpc                     # tRPC v11
  orm: prisma
  auth_provider: authjs         # Auth.js v5
  auth_strategy: authjs
  auth_session_store: postgresql
  database: postgresql          # 16-alpine
  database_pooler: pgbouncer
  cache: valkey                 # 7-alpine (Redis-compatible, MIT)
  job_queue: bullmq             # backed by Valkey
  file_storage: minio           # dev + self-hosted; S3/R2 in SaaS prod
  ui_library: shadcn_ui         # locked — no alternatives (Rule 26)
  chart_library: recharts       # via shadcn/ui Chart
  map_library: none
  icon_set: lucide_react
  complex_ui: kibo_ui           # file dropzone
  media_server: livekit         # self-hosted, Apache 2.0
  turn_server: coturn           # self-hosted
  realtime_signaling: socket_io # presence, chat, call ringing
  payment_gateway: xendit
  bot_protection: cloudflare_turnstile
  bundler: turborepo
  package_manager: pnpm
  node_version: 22
  typescript_strict: true

apps:
  - name: web
    framework: nextjs
    description: Yelli web app — speed dial board, video calling, admin, billing
    role: primary
    auth_required: true
    port_env: APP_PORT
    has_dockerfile: true

# No mobile app — Yelli is web-only with Mobile First responsive design (Rule 13 N/A)
mobile:
  enabled: false
  strategy: web_only_mobile_first
  baseline_viewport: 375
  breakpoints:
    sm: 640
    md: 768
    lg: 1024
    xl: 1280

packages:
  - name: shared
    description: TypeScript types + Zod schemas (single source of validation truth)
    consumers: [web, api-client]
  - name: api-client
    description: Typed tRPC client wrapper
    consumers: [web]
  - name: db
    description: Prisma schema, migrations, seed, AuditLog, tenant-guard extension ($allOperations)
    consumers: [web]
    forbidden_consumers: []     # no mobile to exclude
  - name: ui
    description: shadcn/ui primitives shared across apps + design tokens from docs/DESIGN.md
    consumers: [web]
  - name: jobs
    description: BullMQ workers — recording-processing, report-generation, usage-calculation, billing-cycle
    consumers: [web]
    enabled: true
  - name: storage
    description: Typed MinIO/S3 wrapper with tenant-prefixed keys
    consumers: [web]
    enabled: true

entities:
  - name: Organization
    description: SaaS tenant or self-hosted org root
    fields:
      - { name: id, type: string, primary: true }
      - { name: name, type: string }
      - { name: slug, type: string, unique: true }
      - { name: plan_tier, type: enum, values: [free, pro, enterprise] }
      - { name: subscription_status, type: enum, values: [active, past_due, cancelled, trialing] }
      - { name: billing_email, type: string }
      - { name: created_at, type: datetime }
      - { name: updated_at, type: datetime }
      - { name: suspended_at, type: datetime, nullable: true }
  - name: User
    description: Org member — Tenant Admin, Host, or Participant
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization, nullable_in_multi: false }
      - { name: email, type: string, unique_per_org: true }
      - { name: password_hash, type: string }
      - { name: display_name, type: string }
      - { name: role, type: enum, values: [tenant_admin, host, participant] }
      - { name: is_super_admin, type: boolean, default: false, note: "SaaS only — platform-wide privilege, bypasses tenant guard via separate Prisma client (security.md)" }
      - { name: avatar_url, type: string, nullable: true }
      - { name: status, type: enum, values: [active, inactive] }
      - { name: last_seen_at, type: datetime, nullable: true }
      - { name: security_version, type: integer, default: 0, note: "Incremented on role/tenant/status change — forces session invalidation (security.md V28)" }
      - { name: created_at, type: datetime }
      - { name: updated_at, type: datetime }
  - name: Department
    description: Intercom speed dial endpoint — can be bound to a device
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization }
      - { name: name, type: string }
      - { name: description, type: string, nullable: true }
      - { name: group_label, type: string, nullable: true, note: "floor/wing/section" }
      - { name: sort_order, type: integer }
      - { name: device_binding_token, type: string, nullable: true, unique: true }
      - { name: auto_answer_enabled, type: boolean, default: false }
      - { name: created_at, type: datetime }
      - { name: updated_at, type: datetime }
    derived:
      - { name: is_online, source: presence_engine, note: "Computed from WebSocket presence state, not stored" }
  - name: Meeting
    description: Multi-participant call session (vs CallLog which logs 1:1 intercom)
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization }
      - { name: host_user_id, type: string, fk: User }
      - { name: title, type: string }
      - { name: description, type: string, nullable: true }
      - { name: scheduled_at, type: datetime, nullable: true, note: "null = instant" }
      - { name: started_at, type: datetime, nullable: true }
      - { name: ended_at, type: datetime, nullable: true }
      - { name: meeting_link_token, type: string, unique: true }
      - { name: status, type: enum, values: [scheduled, active, ended, cancelled] }
      - { name: recording_enabled, type: boolean, default: false }
      - { name: livekit_room_name, type: string }
      - { name: lobby_enabled, type: boolean, default: false }
      - { name: locked, type: boolean, default: false }
      - { name: created_at, type: datetime }
  - name: CallLog
    description: Audit record for every call (intercom or meeting)
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization }
      - { name: meeting_id, type: string, fk: Meeting, nullable: true }
      - { name: caller_user_id, type: string, fk: User, nullable: true }
      - { name: caller_department_id, type: string, fk: Department, nullable: true }
      - { name: recipient_department_id, type: string, fk: Department, nullable: true }
      - { name: call_type, type: enum, values: [intercom, meeting] }
      - { name: started_at, type: datetime }
      - { name: ended_at, type: datetime, nullable: true }
      - { name: duration_seconds, type: integer, nullable: true, computed: true }
      - { name: participant_count, type: integer, default: 0 }
      - { name: status, type: enum, values: [completed, missed, failed] }
      - { name: created_at, type: datetime }
  - name: Participant
    description: User or guest joining a meeting
    fields:
      - { name: id, type: string, primary: true }
      - { name: meeting_id, type: string, fk: Meeting }
      - { name: user_id, type: string, fk: User, nullable: true, note: "null for guests" }
      - { name: guest_display_name, type: string, nullable: true }
      - { name: role_in_meeting, type: enum, values: [host, moderator, participant, guest] }
      - { name: joined_at, type: datetime }
      - { name: left_at, type: datetime, nullable: true }
  - name: ChatMessage
    description: In-call chat message (persistent)
    fields:
      - { name: id, type: string, primary: true }
      - { name: meeting_id, type: string, fk: Meeting }
      - { name: sender_user_id, type: string, fk: User, nullable: true }
      - { name: sender_guest_name, type: string, nullable: true }
      - { name: content, type: text }
      - { name: message_type, type: enum, values: [text, file, system] }
      - { name: file_url, type: string, nullable: true }
      - { name: created_at, type: datetime }
  - name: Recording
    description: LiveKit Egress output — stored locally (self-hosted) or S3/R2 (SaaS)
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization }
      - { name: meeting_id, type: string, fk: Meeting }
      - { name: call_log_id, type: string, fk: CallLog }
      - { name: file_path, type: string }
      - { name: file_size_bytes, type: bigint }
      - { name: duration_seconds, type: integer }
      - { name: storage_type, type: enum, values: [local, s3] }
      - { name: status, type: enum, values: [processing, ready, failed, deleted] }
      - { name: recorded_by_user_id, type: string, fk: User }
      - { name: created_at, type: datetime }
      - { name: deleted_at, type: datetime, nullable: true }
  - name: SharedFile
    description: File dropped in-call — persistence gated by plan + self-hosted setting
    fields:
      - { name: id, type: string, primary: true }
      - { name: meeting_id, type: string, fk: Meeting }
      - { name: uploaded_by_user_id, type: string, fk: User, nullable: true }
      - { name: uploaded_by_guest_name, type: string, nullable: true }
      - { name: file_name, type: string }
      - { name: file_path, type: string }
      - { name: file_size_bytes, type: bigint }
      - { name: mime_type, type: string }
      - { name: is_persisted, type: boolean }
      - { name: created_at, type: datetime }
      - { name: expires_at, type: datetime, nullable: true }
  - name: WhiteboardSnapshot
    description: Canvas state at a point in time (persistence gated by plan)
    fields:
      - { name: id, type: string, primary: true }
      - { name: meeting_id, type: string, fk: Meeting }
      - { name: snapshot_data, type: jsonb }
      - { name: is_persisted, type: boolean }
      - { name: created_at, type: datetime }
  - name: Subscription
    description: SaaS plan binding (one per Organization, SaaS only)
    saas_only: true
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization, unique: true }
      - { name: plan_tier, type: enum, values: [free, pro, enterprise] }
      - { name: xendit_subscription_id, type: string, nullable: true }
      - { name: payment_method, type: string, nullable: true }
      - { name: status, type: enum, values: [active, past_due, cancelled, trialing] }
      - { name: current_period_start, type: datetime }
      - { name: current_period_end, type: datetime }
      - { name: minutes_used_this_period, type: integer, default: 0 }
      - { name: recording_minutes_used_this_period, type: integer, default: 0 }
      - { name: created_at, type: datetime }
      - { name: updated_at, type: datetime }
  - name: Invoice
    description: Per-billing-cycle invoice from Xendit (SaaS only)
    saas_only: true
    fields:
      - { name: id, type: string, primary: true }
      - { name: organization_id, type: string, fk: Organization }
      - { name: subscription_id, type: string, fk: Subscription }
      - { name: xendit_invoice_id, type: string, unique: true }
      - { name: amount_cents, type: integer }
      - { name: currency, type: string, default: PHP }
      - { name: status, type: enum, values: [paid, pending, failed, refunded] }
      - { name: issued_at, type: datetime }
      - { name: paid_at, type: datetime, nullable: true }
      - { name: pdf_url, type: string, nullable: true }
  - name: PlatformSettings
    description: Platform-wide singleton (SaaS only)
    saas_only: true
    singleton: true
    fields:
      - { name: id, type: string, primary: true }
      - { name: free_tier_group_call_limit_minutes, type: integer, default: 45 }
      - { name: free_tier_max_participants, type: integer, default: 8 }
      - { name: pro_tier_price_cents, type: integer, default: 299900 }
      - { name: enterprise_tier_price_cents, type: integer, default: 849900 }
      - { name: recording_storage_quota_gb, type: integer }
      - { name: created_at, type: datetime }
      - { name: updated_at, type: datetime }

modules:
  - { name: speed_dial_board,         url_prefix: "/app",          owner_role: [tenant_admin, host, participant] }
  - { name: video_calling,            url_prefix: "/app/call",     owner_role: [tenant_admin, host, participant] }
  - { name: in_call_chat,             url_prefix: "/app/chat",     owner_role: [tenant_admin, host, participant, guest] }
  - { name: file_sharing,             url_prefix: "/app",          owner_role: [tenant_admin, host, participant, guest] }
  - { name: whiteboard,               url_prefix: "/app",          owner_role: [tenant_admin, host, participant, guest] }
  - { name: recording,                url_prefix: "/app/recordings", owner_role: [tenant_admin, host] }
  - { name: meeting_management,       url_prefix: "/app/meetings", owner_role: [tenant_admin, host] }
  - { name: department_management,    url_prefix: "/admin/departments", owner_role: [tenant_admin] }
  - { name: user_management,          url_prefix: "/admin/users",  owner_role: [tenant_admin] }
  - { name: tenant_admin_dashboard,   url_prefix: "/admin",        owner_role: [tenant_admin] }
  - { name: billing,                  url_prefix: "/admin/billing", owner_role: [tenant_admin], saas_only: true }
  - { name: super_admin_panel,        url_prefix: "/superadmin",   owner_role: [super_admin], saas_only: true }
  - { name: reports_export,           url_prefix: "/admin/reports", owner_role: [tenant_admin] }

roles:
  - { name: super_admin,  scope: platform,    saas_only: true, bypasses_tenant_guard: true }
  - { name: tenant_admin, scope: organization }
  - { name: host,         scope: organization }
  - { name: moderator,    scope: per_meeting, transient: true }
  - { name: participant,  scope: organization }
  - { name: guest,        scope: per_meeting, no_account: true }

jobs:
  enabled: true
  provider: bullmq
  backend: valkey
  queues:
    - { name: recording-processing, retries: 3, backoff: exponential, dlq: true }
    - { name: report-generation,    retries: 2, backoff: exponential, dlq: true }
    - { name: usage-calculation,    retries: 3, backoff: exponential, dlq: true, cron: "*/15 * * * *" }
    - { name: billing-cycle,        retries: 5, backoff: exponential, dlq: true, cron: "0 2 * * *" }

storage:
  enabled: true
  provider: minio                # dev + self-hosted
  prod_provider: s3              # SaaS prod uses S3 or R2
  buckets:
    - yelli-{env}
  key_strategy: tenant_prefixed   # {tenant_id}/{entity_type}/{random_filename}
  max_upload_mb: 100
  allowed_mime_types: [image/*, application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.openxmlformats-officedocument.presentationml.presentation, video/*, audio/*]
  blocked_mime_types: [image/svg+xml, text/html, application/javascript]

ports:
  dev:
    base: 43502
    postgres: 43502
    pgbouncer: 43503
    valkey: 43504
    minio: 43505
    minio_console: 43506
    mailhog_smtp: 43507
    mailhog_ui: 43508
    pgadmin: 43509
    app: 43512
    worker: 43513
    prisma_studio: 43522
    livekit_signal: 43532
    livekit_turn_udp_start: 43537
    coturn: 43542
  staging:
    app: 3000        # behind Traefik — no host port exposure
    postgres: 5433
    pgbouncer: 6433
    valkey: 6380
    minio: 9010
    minio_console: 9011
    pgadmin: 5051
  prod:
    app: 3000        # behind Traefik — no host port exposure
    postgres: 5432
    pgbouncer: 6432
    valkey: 6379
    minio: 9000
    minio_console: 9001
    pgadmin: 5050

docker:
  publish: true
  registry: docker.io
  hub_repo: bonitobonita24/yelli
  image_name: yelli
  platforms:
    - linux/amd64
    - linux/arm64
  build_on_push_to: main
  dev_build: true                 # dev compose always rebuilds from source

deploy:
  mode: compose
  k8s:
    enabled: false                # Rule 6 — locked off
  manager: komodo                 # V27 Komodo auto-update for staging, manual for prod
  reverse_proxy: traefik          # V27 — Traefik HTTPS routing in staging/prod, network=proxy
  traefik_network: proxy
  auto_update:
    staging: true
    prod: false

git:
  default_branch: main
  branch_pattern: "feat/{slug}"
  scaffold_pattern: "scaffold/part-{N}"
  commit_style: conventional
  squash_merge: true
  use_worktrees: true

models:
  planning: claude-code           # Opus 4.6 — Architect (Rule 24)
  execution: claude-sonnet-4-6    # Sonnet 4.6 — Executor (V31 primary)
  governance: gemini-2.5-flash-lite

vibe_test:
  enabled: true                   # Phase 2.7 stress-test active

context7:
  enabled: true                   # Rule 30 — live library docs MCP

accessibility:
  level: wcag_aa                  # required for govt/hospital deployments

payment:
  gateway: xendit
  currency: PHP
  methods: [card, gcash, maya, grabpay, bank_transfer]
  recurring: true
  refunds: full_and_partial
  multi_currency: false

turnstile:
  enabled: true
  widget_mode: managed
  protected_pages: [login, register, forgot_password, join_meeting]

video:
  provider: livekit_self_hosted
  sfu_model: livekit
  egress_enabled: true
  egress_storage: minio           # writes recording to MinIO bucket
  max_participants_per_room: 50
  max_participants_free: 8
  max_participants_pro: 25
  max_participants_enterprise: 50
  call_setup_target_ms: 150
  reconnection_timeout_seconds: 30
  turn_server: coturn

realtime:
  provider: socket_io
  features: [presence, in_call_chat, call_ringing, notifications]
  heartbeat_seconds: 30
  session_revalidate_seconds: 60  # security.md realtime safety

security:
  layers_always_active: [L3, L5, L6]
  layers_dormant_in_single_tenant: [L1, L2, L4]
  http_headers_enabled: true       # V18 — always-on
  rate_limiter_enabled: true
  rate_limits:
    public: { interval_ms: 60000, limit: 30 }
    auth:   { interval_ms: 60000, limit: 10 }
    api:    { interval_ms: 60000, limit: 120 }
    upload: { interval_ms: 60000, limit: 20 }
    call_initiation: { interval_ms: 60000, limit: 10 }
  cors_origins:
    dev: "http://localhost:*"
    staging: "https://yelli-staging.powerbyte.app"
    prod: "https://yelli.powerbyte.app"
  audit_events:
    - user_create
    - user_delete
    - user_role_change
    - department_create
    - department_delete
    - recording_start
    - recording_stop
    - plan_upgrade
    - plan_downgrade
    - tenant_suspend
    - tenant_reactivate
    - payment_event
    - session_invalidated
  csrf_strategy: trpc_samesite_cookies  # Auth.js v5 SameSite=lax + tRPC POST
  webrtc_security:
    media_encryption: dtls_srtp
    livekit_token_strategy: room_scoped_jwt
    turn_credential_rotation: enabled

nfr:
  api_response_target_ms: 200
  concurrent_users_target: 100
  uptime_sla: "99.5%"
  data_retention:
    call_logs: indefinite
    recordings_free: not_applicable
    recordings_pro_days: 90
    recordings_enterprise_days: 365
    chat_history_free_days: 30
    chat_history_pro_days: 365
    chat_history_enterprise: unlimited

out_of_scope:
  - e2ee
  - native_mobile_apps
  - public_api
  - ai_features
  - i18n
  - sso_saml
  - breakout_rooms
  - virtual_backgrounds
  - calendar_integration
  - scheduled_reports
  - pstn_dialin
  - live_streaming
